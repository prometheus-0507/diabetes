<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Portal DMG</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style/login.css">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">Portal DMG</a>
    </div>
</nav>

<!-- CONTEÚDO -->
<section class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="row w-100 justify-content-center">
        <div class="col-lg-4 col-md-6 col-sm-10">

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">

                    <h4 class="text-center fw-bold mb-4">CADASTRAR ACESSO</h4>

                    <form id="registerForm">

                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" id="registerName" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="registerEmail" required>
                        </div>

                        <!-- SENHA -->
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="registerPassword" required>
                                <span class="input-group-text toggle-password" data-target="registerPassword">
                                    <i class="bi bi-eye"></i>
                                </span>
                            </div>
                        </div>

                        <!-- CONFIRMAR SENHA -->
                        <div class="mb-3">
                            <label class="form-label">Confirmar senha</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="registerConfirmPassword" required>
                                <span class="input-group-text toggle-password" data-target="registerConfirmPassword">
                                    <i class="bi bi-eye"></i>
                                </span>
                            </div>
                        </div>

                        <small class="text-danger d-none" id="passwordError">
                            As senhas não coincidem.
                        </small>

                        <button type="submit" class="btn btn-primary w-100 mt-3">
                            Cadastrar
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <small>
                            Já tem conta?
                            <a href="login.html" class="fw-semibold text-primary text-decoration-none">
                                Entrar
                            </a>
                        </small>
                    </div>

                </div>
            </div>

        </div>
    </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS MOSTRAR / OCULTAR SENHA -->
<script>
    document.querySelectorAll('.toggle-password').forEach(toggle => {
        toggle.addEventListener('click', () => {
            const input = document.getElementById(toggle.dataset.target);
            const icon = toggle.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
    });
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- JS CENTRAL -->
<script src="js/auth.js"></script>



</body>
</html>
